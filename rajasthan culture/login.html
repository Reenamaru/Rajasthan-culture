<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajasthan Royal Heritage Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', serif;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 60px 40px;
            width: 420px;
            border-radius: 30px;
            border: 2px solid #d4af37; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(212, 175, 55, 0.2);
            text-align: center;
            color: #fff;
            animation: fadeInScale 1.2s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            font-size: 2.8rem;
            color: #d4af37;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }

        .tagline {
            font-size: 1rem;
            margin-bottom: 40px;
            color: #fff;
            letter-spacing: 2px;
            font-weight: 300;
            border-bottom: 1px solid #d4af37;
            display: inline-block;
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px;
            padding-right: 50px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            outline: none;
            color: #fff;
            font-size: 1rem;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #d4af37;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #d4af37, #b8860b, #d4af37);
            background-size: 200% auto;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.5s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>पधारो</h2>
        <p class="tagline">ROYAL RAJASTHAN</p>

        <form onsubmit="event.preventDefault(); check();">
            <div class="input-group">
                <input type="text" placeholder="Username / नाम" id="u" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password / पासवर्ड" id="p" required>
                <span class="toggle-password" id="eyeIcon" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit" class="login-btn">Enter Palace</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            let passInput = document.getElementById('p');
            let eye = document.getElementById('eyeIcon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eye.innerText = "🙈"; 
            } else {
                passInput.type = "password";
                eye.innerText = "👁️"; 
            }
        }

        function check() {
            let user = document.getElementById('u').value;
            let pass = document.getElementById('p').value;

            // Password match hote hi seedha redirect
            if(user === "admin" && pass === "1234") {
                window.location.href = "index.html"; 
            } else {
                alert("Incorrect Credentials, Hukum! ❌");
            }
        }
    </script>
</body>
</html>
